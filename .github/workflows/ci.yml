name: CI

on:
  push:
    branches: ["main", "infrastructure-ready-source", "v1.0.2-pool-rpc-framework-hardening"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Go version
        run: go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmd/legacywallet/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/legacywallet/frontend
        run: npm ci

      - name: Build frontend
        working-directory: cmd/legacywallet/frontend
        run: npm run build

      - name: Install Windows GCC (MSYS2 UCRT64)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          go mod download
          go test ./internal/p2p ./internal/rpc ./internal/wallet ./internal/mempool
          go vet ./internal/p2p ./internal/rpc ./internal/wallet ./internal/mempool
          go test ./cmd/... ./internal/...
          go vet ./cmd/... ./internal/...
          go build -trimpath -o legacycoind ./cmd/legacycoind
          go build -trimpath -o legacycoin-cli ./cmd/legacycoin-cli
          go build -trimpath -o legacy-wallet-internal ./cmd/legacywallet
          ./legacycoind params | tee params.txt
          grep -q "yespower backend: cgo-c-reference" params.txt

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          go mod download
          go test ./internal/p2p ./internal/rpc ./internal/wallet ./internal/mempool
          go vet ./internal/p2p ./internal/rpc ./internal/wallet ./internal/mempool
          go test ./cmd/... ./internal/...
          go vet ./cmd/... ./internal/...
          go build -trimpath -o legacycoind.exe ./cmd/legacycoind
          go build -trimpath -o legacycoin-cli.exe ./cmd/legacycoin-cli
          go build -trimpath -o legacy-wallet-internal.exe ./cmd/legacywallet
          $params = .\legacycoind.exe params | Out-String
          $params
          if ($params -notmatch "yespower backend:\s+cgo-c-reference") { throw "Expected cgo-c-reference backend for production build." }
