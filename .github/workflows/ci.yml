name: CI

on:
  push:
    branches:
      - main
      - v1.0.2-mainnet-candidate
      - v1.0.3-integration-hardening
      - v1.0.4-core-integration-release-superiority
      - infrastructure-ready-source
      - v1.0.2-pool-rpc-framework-hardening
  pull_request:
    branches:
      - main
      - v1.0.2-mainnet-candidate
      - v1.0.3-integration-hardening
  workflow_dispatch:

jobs:
  source-cleanliness:
    name: Source cleanliness and leak scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked source
        shell: pwsh
        run: ./scripts/scan-source-cleanliness.ps1 -Root . -FailOnWorkingTree

  build-test:
    name: Build and test (${{ matrix.os }})
    needs: source-cleanliness
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Go version
        run: go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmd/legacywallet/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: cmd/legacywallet/frontend
        run: npm ci

      - name: Build frontend
        working-directory: cmd/legacywallet/frontend
        run: npm run build

      - name: Install Windows GCC (MSYS2 UCRT64)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Test and vet (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          go mod download
          go test ./...
          go vet ./...

      - name: Build binaries (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          go build -trimpath -o legacycoind ./cmd/legacycoind
          go build -trimpath -o legacycoin-cli ./cmd/legacycoin-cli
          go build -trimpath -o legacy-wallet-internal ./cmd/legacywallet
          ./legacycoind params | tee params.txt
          grep -q "yespower backend: cgo-c-reference" params.txt
          pwsh ./scripts/verify-mainnet-identity.ps1 -Binary ./legacycoind

      - name: Chaos CI smoke (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: "1"
        run: |
          chmod +x ./scripts/chaos-ci-smoke.sh
          ./scripts/chaos-ci-smoke.sh ./legacycoind ./legacycoin-cli ./.tmp-chaos-ci

      - name: Test and vet (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          go mod download
          go test ./...
          go vet ./...

      - name: Build binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          go build -trimpath -o legacycoind.exe ./cmd/legacycoind
          go build -trimpath -o legacycoin-cli.exe ./cmd/legacycoin-cli
          go build -trimpath -o legacy-wallet-internal.exe ./cmd/legacywallet
          $params = .\legacycoind.exe params | Out-String
          $params
          if ($params -notmatch "yespower backend:\s+cgo-c-reference") { throw "Expected cgo-c-reference backend for production build." }
          ./scripts/verify-mainnet-identity.ps1 -Binary .\legacycoind.exe

      - name: Final source scan
        shell: pwsh
        run: ./scripts/scan-source-cleanliness.ps1 -Root .
